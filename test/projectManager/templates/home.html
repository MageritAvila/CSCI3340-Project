{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSCI3340Project</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;

        /* Background image */
        background: linear-gradient(rgba(12, 34, 56, 0.75), rgba(12, 34, 56, 0.75)), url("{% static 'images/pexels-icon0-479444.jpg' %}") center/cover no-repeat;
        min-height: 100vh;
        color: #eef3ff;    }

    /* ===== NAVBAR ===== */
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 30px;
        background-color: rgba(10, 24, 46, 0.88);
    }

    .nav-left {
        font-size: 24px;
        font-weight: bold;
        color: #eef3ff;
    }

    .nav-right {
        display: flex;
        gap: 10px;
    }

    .nav-btn {
        color: #eef3ff;
        border: 1px solid rgba(238, 243, 255, 0.25);
        background:transparent;
        padding: 10x 16xp;
        border-radius: 8xp;
        font-size:14xp;
        cursor:pointer;
    
    }

    .nav-btn:hover {
        background-color: rgba(238, 243, 255, 0.12);
        border-color: rgba(238, 243, 255, 0.48);
    }

    /* ===== CENTER CONTENT ===== */
    .center-content {
        height: calc(100vh - 80px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: #5a3a1b;
    }

    .center-content h1 {
        font-size: 60px;
        margin-bottom: 10px;
        color: #eef3ff;
    }

    .center-content h3 {
        font-size: 30px;
        margin: 0;
        color: #cbd6eb;
    }

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-left">Project Manager</div>

    <div class="nav-right">
        <button class="nav-btn" onclick="location.href='login'">
            Sign In
        </button>

        <button class="nav-btn" onclick="location.href='signup'">
            Sign Up
        </button>
    </div>
</div>

<!-- WELCOME CONTENT -->
<div class="center-content">
    <h1>Welcome!</h1>
    <h3>Sign In to Begin</h3>
</div>

</body>
</html>
